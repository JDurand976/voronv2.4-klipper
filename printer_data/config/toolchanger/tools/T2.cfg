# This file contains pin mappings for the LDO Nitehawk-36 Toolboard
# To use this config, the firmware should be compiled for the Raspberry Pi RP2040
# Make sure to include this config *at the end* of printer.cfg to overwrite the relevent sections

# See https://docs.ldomotors.com/en/Toolboard/nitehawk-36#firmware-setup-and-update
# For instructions on uploading/updating klipper firmware to the PCB

## LDO Nitehawk-SB Toolboard Partial Config

## *** THINGS TO CHANGE/CHECK: ***
## MCU paths                            [mcu] section
## Thermistor types                     [extruder] sections

## *MAKE SURE* to include this partial config file *AFTER* the main controller config. 
## This will ensure the relavent sections are overwritten by the pin mappings specified here.

[mcu nhk2]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_rp2040_34343433391317A6-if00
restart_method: command
##--------------------------------------------------------------------

#####################################################################
#   Endstops
#####################################################################
## XES - Toolhead PCB
# [stepper_x]
# endstop_pin:tmc5160_stepper_x:virtual_endstop


#####################################################################
#   Filament Sensor
#####################################################################
#[filament_switch_sensor filament_sensor]
#switch_pin: nhk2:gpio3
#pause_on_runout: True

#####################################################################
# 	Extruder
#####################################################################
[extruder]
step_pin: nhk2:gpio23
dir_pin: nhk2:gpio24
enable_pin: !nhk2:gpio25
heater_pin: nhk2:gpio9
sensor_pin: nhk2:gpio29
sensor_type: ATC Semitec 104GT-2
#control: pid
pullup_resistor: 2200
microsteps: 16 
full_steps_per_rotation: 200 
rotation_distance: 4.637
nozzle_diameter: 0.400                            
filament_diameter: 1.750
min_temp: 0
max_temp: 280

[tmc2209 extruder]
sense_resistor: 0.100
uart_pin: nhk2:gpio0
tx_pin: nhk2:gpio1
interpolate: false
run_current: 0.6        #recommend setting it below 0.7A.

#####################################################################
#   Fans
#####################################################################
## PCF
[fan_generic T2_part_fan]
pin: nhk2:gpio6


## HEF
[heater_fan T2_hotend_fan]
pin: nhk2:gpio5
tachometer_pin: nhk2:gpio16
tachometer_ppr: 2

#####################################################################
# 	Probe
#####################################################################
## Probe Port
# [probe]
# pin: nhk2:gpio10
[tool_probe T2]
pin: ^nhk2:gpio10
tool: 0
z_offset: 0
speed: 8
samples: 3
samples_result: median
sample_retract_dist: 2
lift_speed: 5
samples_tolerance: 0.006
samples_tolerance_retries: 3
activate_gcode: _TAP_PROBE_ACTIVATE HEATER=extruder2

#####################################################################
#   Lights
#####################################################################
##Stealthburner Headlights
[neopixel T2]
pin: nhk2:gpio7
chain_count: 3
color_order: GRBW
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 1.0
initial_WHITE: 0.0

## PCB Activity Light
[output_pin act_led T2]
pin: !nhk2:gpio8

#####################################################################
#   Accelerometer
#####################################################################
[adxl345]
cs_pin: nhk2:gpio27
spi_software_sclk_pin: nhk2:gpio18
spi_software_mosi_pin: nhk2:gpio20
spi_software_miso_pin: nhk2:gpio19

[resonance_tester]
accel_chip: adxl345
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0
##--------------------------------------------------------------------
## Uncomment below for 250mm build
#probe_points:
#    125, 125, 20

## Uncomment below for 300mm build
probe_points:
    155, 155, 20

## Uncomment below for 350mm build
#probe_points:
#    175, 175, 20

#####################################################################
#   Addtional Sensors
#####################################################################
[temperature_sensor NH36]
sensor_type: temperature_mcu
sensor_mcu: nhk2
min_temp: 0
max_temp: 100

# change the gcode_macro section name to the tool you are configuring:
# T2, T1, etc.
[gcode_macro T2]
variable_active: 0 # Must be zero.
variable_color: "" # Leave empty
gcode:
    SELECT_TOOL T=2 # change to the index of the tool. 0, 1, 2, etc.