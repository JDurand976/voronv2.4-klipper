# This file contains pin mappings for the LDO Nitehawk-36 Toolboard
# To use this config, the firmware should be compiled for the Raspberry Pi RP2040
# Make sure to include this config *at the end* of printer.cfg to overwrite the relevent sections

# See https://docs.ldomotors.com/en/Toolboard/nitehawk-36#firmware-setup-and-update
# For instructions on uploading/updating klipper firmware to the PCB

## LDO Nitehawk-SB Toolboard Partial Config

## *** THINGS TO CHANGE/CHECK: ***
## MCU paths                            [mcu] section
## Thermistor types                     [extruder] sections

## *MAKE SURE* to include this partial config file *AFTER* the main controller config. 
## This will ensure the relavent sections are overwritten by the pin mappings specified here.

[mcu nhk1]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_rp2040_3434343339134882-if00
restart_method: command
##--------------------------------------------------------------------

#####################################################################
#   Endstops
#####################################################################
## XES - Toolhead PCB
# [stepper_x]
# endstop_pin:tmc5160_stepper_x:virtual_endstop


#####################################################################
#   Filament Sensor
#####################################################################
#[filament_switch_sensor filament_sensor]
#switch_pin: nhk1:gpio3
#pause_on_runout: True

#####################################################################
# 	Extruder
#####################################################################
[extruder]
step_pin: nhk1:gpio23
dir_pin: nhk1:gpio24
enable_pin: !nhk1:gpio25
heater_pin: nhk1:gpio9
sensor_pin: nhk1:gpio29
sensor_type: ATC Semitec 104GT-2
control: pid
pullup_resistor: 2200
microsteps: 16 
full_steps_per_rotation: 200 
rotation_distance: 4.637
nozzle_diameter: 0.400                            
filament_diameter: 1.750
min_temp: 0
max_temp: 280

[tmc2209 extruder]
sense_resistor: 0.100
uart_pin: nhk1:gpio0
tx_pin: nhk1:gpio1
interpolate: false
run_current: 0.6        #recommend setting it below 0.7A.

#####################################################################
#   Fans
#####################################################################
## PCF
[fan_generic T1_part_fan]
pin: nhk1:gpio6

## HEF
[heater_fan T1_hotend_fan]
pin: nhk1:gpio5
tachometer_pin: nhk1:gpio16
tachometer_ppr: 2

#####################################################################
# 	Probe
#####################################################################
## Probe Port
# [probe]
# pin: nhk1:gpio10
[tool_probe T1]
pin: nhk1:gpio10
tool: 1
z_offset: 0
speed: 8
samples: 3
samples_result: median
sample_retract_dist: 2
lift_speed: 5
samples_tolerance: 0.006
samples_tolerance_retries: 3
activate_gcode: _TAP_PROBE_ACTIVATE HEATER=extruder1

[tool T1]
tool_number: 1 # change to the index of the tool. 0, 1, 2, etc.
extruder: extruder1 # change to match the extruder you are configuring: extruder, extruder1, etc.
fan: T1_part_fan
# detection_pin: # Only required for non TAP probing.
params_park_x: 0 # The absolute X-position of the tool in its dock.
params_park_y: 0 # The absolute Y-position of the tool in its dock.
params_park_z: 0 # The absolute Z-position where the tool and shuttle mate in the dock, determined when the TAP (or Z-probe) triggers.
gcode_x_offset: 0 # The X-Axis offset of the nozzle's orifice in relation to tool 0
gcode_y_offset: 0 # The Y-Axis offset of the nozzle's orifice in relation to tool 0
gcode_z_offset: 0 # The Z-Axis offset of the nozzle's orifice in relation to tool 0

#####################################################################
#   Lights
#####################################################################
##Stealthburner Headlights
[neopixel T1]
pin: nhk1:gpio7
chain_count: 3
color_order: GRBW
initial_RED: 1.0
initial_GREEN: 0.0
initial_BLUE: 1.0
initial_WHITE: 0.0

## PCB Activity Light
[output_pin T1_act_led]
pin: !nhk1:gpio8

#####################################################################
#   Accelerometer
#####################################################################
[adxl345]
cs_pin: nhk1:gpio27
spi_software_sclk_pin: nhk1:gpio18
spi_software_mosi_pin: nhk1:gpio20
spi_software_miso_pin: nhk1:gpio19

[resonance_tester]
accel_chip: adxl345
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0
##--------------------------------------------------------------------
## Uncomment below for 250mm build
#probe_points:
#    125, 125, 20

## Uncomment below for 300mm build
probe_points:
    155, 155, 20

## Uncomment below for 350mm build
#probe_points:
#    175, 175, 20

#####################################################################
#   Addtional Sensors
#####################################################################
[temperature_sensor NH36]
sensor_type: temperature_mcu
sensor_mcu: nhk1
min_temp: 0
max_temp: 100

# change the gcode_macro section name to the tool you are configuring:
# T1, T1, etc.
[gcode_macro T1]
variable_active: 0 # Must be zero.
variable_color: "" # Leave empty
gcode:
    SELECT_TOOL T=1 # change to the index of the tool. 0, 1, 2, etc.